spring:
  datasource:
    url: ${SPRING_DATASOURCE_URL}
    username: ${DB_USERNAME}
    password: ${DB_PASSWORD}
  jpa:
    hibernate:
      ddl-auto: validate
    show-sql: false
  flyway:
    enabled: true

app:
  cors:
    allowed-origins: ${APP_CORS_ALLOWED_ORIGINS}
  seed:
    enabled: false
  security:
    jwt:
      secret: ${APP_JWT_SECRET}
