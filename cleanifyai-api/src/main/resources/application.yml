spring:
  application:
    name: cleanifyai-api
  profiles:
    default: dev
  jpa:
    open-in-view: false
    properties:
      hibernate:
        format_sql: true
  flyway:
    baseline-on-migrate: true
    locations: classpath:db/migration
  jackson:
    time-zone: America/Sao_Paulo

server:
  port: ${SERVER_PORT:8080}

management:
  endpoints:
    web:
      exposure:
        include: health,info
  endpoint:
    health:
      probes:
        enabled: true
      show-details: never
  health:
    livenessstate:
      enabled: true
    readinessstate:
      enabled: true

app:
  cors:
    allowed-origins:
      - http://localhost:4200
      - http://127.0.0.1:4200
  integracoes:
    whatsapp-enabled: ${APP_WHATSAPP_ENABLED:false}
    ia-enabled: ${APP_AI_ENABLED:false}
  security:
    jwt:
      expiration-seconds: ${APP_JWT_EXPIRATION_SECONDS:43200}
    refresh-token:
      expiration-seconds: ${APP_REFRESH_TOKEN_EXPIRATION_SECONDS:2592000}
    rate-limit:
      login-max-attempts: ${APP_LOGIN_RATE_LIMIT_MAX_ATTEMPTS:5}
      login-window-seconds: ${APP_LOGIN_RATE_LIMIT_WINDOW_SECONDS:900}
