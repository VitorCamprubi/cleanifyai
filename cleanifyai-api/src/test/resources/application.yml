spring:
  datasource:
    url: jdbc:h2:mem:cleanifyai;MODE=MySQL;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE
    driver-class-name: org.h2.Driver
    username: sa
    password:
  jpa:
    hibernate:
      ddl-auto: create-drop
    open-in-view: false
  flyway:
    enabled: false
  sql:
    init:
      mode: never

app:
  seed:
    enabled: false
  security:
    jwt:
      secret: cleanifyai-jwt-secret-chave-com-32-caracteres-minimos
      expiration-seconds: 43200

management:
  endpoints:
    web:
      exposure:
        include: health,info
  endpoint:
    health:
      probes:
        enabled: true
