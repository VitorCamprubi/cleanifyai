<div class="toast-stack" aria-live="polite" aria-atomic="true">
  @for (toast of toastService.toasts$ | async; track toast.id) {
    <article class="toast" [class.toast--success]="toast.type === 'success'" [class.toast--error]="toast.type === 'error'">
      <div class="toast__content">
        <strong>{{ toast.title }}</strong>
        <p>{{ toast.message }}</p>
      </div>
      <button type="button" class="toast__close" (click)="toastService.remover(toast.id)" aria-label="Fechar notificacao">
        x
      </button>
    </article>
  }
</div>
